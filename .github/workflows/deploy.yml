name: Deploy to GitHub Pages

# A weboldal minden main-re történő push után automatikusan frissül.
on:
  push:
    branches: [main]
  workflow_dispatch:

# A GitHub Pages deployhoz szükséges jogosultságok.
permissions:
  contents: read
  pages: write
  id-token: write

# Egyszerre csak egy deploy fusson; az újabb felülírja a folyamatban lévőt.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # A repó gyökerét töltjük fel statikus oldalként.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
