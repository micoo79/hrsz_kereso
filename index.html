<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helyrajziszám-kereső</title>
  <meta name="description" content="Helyrajziszám-kereső: ingatlanok helyrajzi számának (HRSZ) keresése település és cím vagy helyrajzi szám alapján." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <!-- ====== BAL OLDALI KERESŐ PANEL ====== -->
    <aside class="search-container">
      <!-- Fejléc -->
      <header class="app-header">
        <div class="brand">
          <span class="brand-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z" fill="currentColor"/>
            </svg>
          </span>
          <span class="brand-title">Helyrajziszám-kereső</span>
        </div>
      </header>

      <div class="search-form-container">
        <!-- Bevezető -->
        <p class="parcel-info">
          A Helyrajziszám-keresővel könnyedén megtalálhatja bármely magyarországi
          ingatlan helyrajzi számát (HRSZ) és telekhatárait térképen.
        </p>

        <!-- Kereső űrlap -->
        <form class="search-form" autocomplete="off" novalidate>
          <!-- Település -->
          <div class="field">
            <label class="form-label" for="settlement">Település</label>
            <div class="input-wrap">
              <input
                type="text"
                id="settlement"
                name="settlement"
                class="text-input"
                placeholder="pl.: Szeged"
              />
              <button type="button" class="clear-btn" data-clear="settlement" aria-label="Törlés" hidden>&times;</button>
            </div>
          </div>

          <!-- Keresés módja -->
          <div class="field">
            <span class="form-label">Keresés módja</span>
            <div class="tabs" role="tablist">
              <button type="button" class="tab" role="tab" data-tab="cim" aria-selected="false">Cím</button>
              <button type="button" class="tab is-active" role="tab" data-tab="hrsz" aria-selected="true">Helyrajzi szám</button>
            </div>

            <!-- Helyrajzi szám fül -->
            <div class="tab-panel" data-panel="hrsz">
              <div class="input-wrap">
                <input
                  type="text"
                  id="lotNumber"
                  name="lotNumber"
                  class="text-input"
                  placeholder="pl.: 1234/A/12"
                />
                <button type="button" class="clear-btn" data-clear="lotNumber" aria-label="Törlés" hidden>&times;</button>
              </div>
            </div>

            <!-- Cím fül -->
            <div class="tab-panel" data-panel="cim" hidden>
              <div class="input-wrap">
                <input
                  type="text"
                  id="address"
                  name="address"
                  class="text-input"
                  placeholder="pl.: Arany János út 22"
                />
                <button type="button" class="clear-btn" data-clear="address" aria-label="Törlés" hidden>&times;</button>
              </div>
            </div>
          </div>
        </form>

        <!-- Találatok -->
        <section class="result-card-wrapper">
          <p class="result-card-title">Találatok (1 db)</p>

          <article class="result-card">
            <p class="result-card-address">Magyarnándor, Arany János út 22</p>
            <p class="result-card-hrsz">HRSZ: 467</p>
            <div class="result-card-footer-items">
              <span class="result-card-tag">Belterület</span>
              <a
                class="property-sheet-navigation-link"
                href="https://magyarorszag.hu/eing_new?hrsz.telepules=Magyarn%C3%A1ndor&hrsz.fekves=BELTERULET&hrsz.hrszFold=467&cim=Arany%20J%C3%A1nos%20%C3%BAt%2022"
                target="_blank"
                rel="noopener"
              >
                Tulajdoni lap <span class="chevron" aria-hidden="true">›</span>
              </a>
            </div>
          </article>
        </section>
      </div>

      <!-- Lábléc -->
      <footer class="app-footer">
        <span class="footer-version">HRSZ Kereső</span>
      </footer>
    </aside>

    <!-- ====== JOBB OLDAL: térkép helye (később) ====== -->
    <main class="map-container" aria-label="Térkép">
      <div class="map-placeholder">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z" fill="currentColor"/>
        </svg>
        <p>Térkép</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
